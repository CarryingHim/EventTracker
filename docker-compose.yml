version: "3.9"

services:
  botc:
    image: ghcr.io/carryinghim/eventtracker:latest
    container_name: botc
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "8484:8000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      DATA_DIR: /data
    volumes:
      - ${DATA_PATH:-./data}:/data

  whatsapp-bot:
    image: ghcr.io/carryinghim/eventtracker-bot:latest
    container_name: whatsapp-bot
    restart: unless-stopped
    depends_on:
      - botc
    environment:
      - API_URL=http://botc:8000
      - GROUP_JID=${WHATSAPP_GROUP_JID}
      - PUBLIC_URL=${PUBLIC_URL}
    volumes:
      - ./bot/auth_info:/app/auth_info
